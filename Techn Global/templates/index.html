<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Caliber AI| TechnGlobal</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: #060612; color: #e2e2f0; height: 100vh;
      display: flex; flex-direction: column; align-items: center; justify-content: center; overflow: hidden;
    }

    body::before {
      content: ''; position: fixed; top: -50%; left: -50%; width: 200%; height: 500%;
      background: radial-gradient(circle at top left, rgba(255, 0, 128, 0.45), transparent 40%),
                  radial-gradient(circle at top right, rgba(0, 200, 255, 0.45), transparent 40%),
                  radial-gradient(circle at bottom left, rgba(0, 255, 150, 0.45), transparent 40%),
                  radial-gradient(circle at bottom right, rgba(255, 200, 0, 0.45), transparent 40%),
                  radial-gradient(circle at center, rgba(140, 0, 255, 0.1), transparent 50%), #080810;
      z-index: 0; pointer-events: none;
    }

    .app-wrapper {
      position: relative; z-index: 1; width: 100%; max-width: 820px; height: 94vh;
      display: flex; flex-direction: column; border-radius: 24px; overflow: hidden;
      border: 4px solid rgba(255,255,255,0.07);
      background: radial-gradient(circle at 15% 20%, rgba(255, 0, 128, 0.18) 0%, transparent 40%),
                  radial-gradient(circle at 85% 25%, rgba(0, 255, 255, 0.15) 0%, transparent 40%),
                  radial-gradient(circle at 50% 80%, rgba(128, 0, 255, 0.12) 0%, transparent 45%), #050510;
      box-shadow: 0 40px 100px rgba(0,0,0,0.7), 0 0 0 1px rgba(99,60,255,0.1); backdrop-filter: blur(20px);
    }

    .header {
      display: flex; align-items: center; gap: 14px; padding: 8px 16px;
      background: rgba(10,10,10,0.99); border-bottom: 1px solid rgba(255,255,255,0.06); position: relative;
    }
    .header::after {
      content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(99,60,255,0.4), rgba(0,200,180,0.3), transparent);
    }

    .brand { display: flex; align-items: center; gap: 12px; flex: 1; }
    .logo-wrap {
      width: 44px; height: 44px; border-radius: 14px;
      background: linear-gradient(135deg, #6c3fff 0%, #00c8b4 100%);
      display: flex; align-items: center; justify-content: center; font-size: 22px; box-shadow: 0 4px 20px rgba(108,63,255,0.4); flex-shrink: 0;
    }

    .brand-text h1 { font-size: 16px; font-weight: 700; color: #fff; letter-spacing: -0.01em; }
    .brand-text p { font-size: 11px; color: #8a8ab8; margin-top: 1px; }
    .badge { font-size: 10px; font-weight: 600; padding: 3px 9px; border-radius: 20px; background: rgba(0,200,180,0.15); border: 1px solid rgba(0,200,180,0.3); color: #00c8b4; text-transform: uppercase; }

    .chat-area { 
      flex: 1 1 auto; 
      overflow-y: auto; 
      padding: 12px 24px 4px 24px; 
      display: flex; 
      flex-direction: column; 
      gap: 12px; 
      height: 0;
    }
    .chat-area::-webkit-scrollbar { width: 3px; }
    .chat-area::-webkit-scrollbar-thumb { background: rgba(108,63,255,0.25); border-radius: 4px; }

    .welcome { 
      display: flex; 
      flex-direction: column; 
      align-items: center; 
      justify-content: flex-start; 
      text-align: center; 
      margin-top: 5px; 
      width: 100%;
    }
    .welcome h2 { font-size: 22px; font-weight: 700; color: #fff; margin-bottom: 4px; }
    .welcome h2 span { background: linear-gradient(90deg, #a78bfa, #00c8b4); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .welcome p { font-size: 12px; color: #6b6b9a; margin-bottom: 12px; max-width: 580px; line-height: 1.45; }

    .reconnect-banner {
      background: rgba(0, 200, 180, 0.08); border: 1px dashed rgba(0, 200, 180, 0.4);
      padding: 10px; border-radius: 12px; width: 100%; max-width: 700px; margin-bottom: 12px; text-align: left;
    }
    .reconnect-banner h4 { font-size: 11px; color: #00c8b4; font-weight: 600; }
    .reconnect-banner p { font-size: 11px; color: #8a8ab8; margin: 2px 0 6px; }
    .reconnect-btn { background: #00c8b4; border: none; padding: 4px 10px; border-radius: 6px; color: #000; font-size: 11px; font-weight: 600; cursor: pointer; }

    .role-grid { 
      display: grid; 
      grid-template-columns: repeat(3, 1fr); 
      gap: 10px; 
      width: 100%; 
      max-width: 720px; 
      margin-bottom: 10px; 
    }
    @media (max-width: 740px) { .role-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 500px) { .role-grid { grid-template-columns: 1fr; } }
    
    .role-card { background: rgba(255,255,255,0.02); border: 1px solid rgba(108,63,255,0.15); padding: 10px; border-radius: 12px; text-align: left; cursor: pointer; transition: all 0.2s; display: flex; flex-direction: column; justify-content: space-between; }
    .role-card:hover { background: rgba(108,63,255,0.08); border-color: #00c8b4; transform: translateY(-2px); box-shadow: 0 4px 15px rgba(108,63,255,0.15); }
    .role-card h3 { font-size: 13px; color: #fff; font-weight: 600; }
    .role-card p { font-size: 11px; color: #6b6b9a; margin-top: 3px; line-height: 1.3; }

    .reload-btn { background: transparent; border: none; color: #00c8b4; font-size: 11px; font-weight: 500; cursor: pointer; text-decoration: underline; margin-bottom: 6px;}

    .message { display: flex; gap: 10px; max-width: 85%; animation: fadeUp .22s ease; }
    @keyframes fadeUp { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
    .message.user { align-self: flex-end; flex-direction: row-reverse; }
    .message.bot  { align-self: flex-start; }

    .msg-avatar { width: 32px; height: 32px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; }
    .message.bot  .msg-avatar { background: linear-gradient(135deg, #6c3fff, #00c8b4); }
    .message.user .msg-avatar { background: rgba(108,63,255,0.2); border: 1px solid rgba(108,63,255,0.3); }

    .bubble { padding: 12px 16px; border-radius: 16px; font-size: 14px; line-height: 1.6; word-break: break-word; white-space: pre-wrap; }
    .message.bot .bubble { background: rgba(20,18,45,0.9); border: 1px solid rgba(108,63,255,0.15); border-bottom-left-radius: 4px; color: #ddd8ff; }
    .message.user .bubble { background: linear-gradient(135deg, #6c3fff, #5533dd); color: #fff; border-bottom-right-radius: 4px; }
    
    .dots { display: flex; gap: 4px; padding: 4px 0; }
    .dots span { width: 8px; height: 8px; background: #00c8b4; border-radius: 50%; animation: bounce 1.4s infinite ease-in-out both; }
    .dots span:nth-child(1) { animation-delay: -0.32s; }
    .dots span:nth-child(2) { animation-delay: -0.16s; }
    @keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1.0); } }

    .msg-time { font-size: 10px; color: #3a3a6a; margin-top: 4px; padding: 0 4px; }
    .message.user .msg-time { text-align: right; }
    .msg-col { display: flex; flex-direction: column; }

    .input-section {
      padding: 10px 16px 10px; background: #000000; border-top: 1px solid transparent;
      border-image: linear-gradient(90deg, rgba(255,0,128,0.6), rgba(0,200,255,0.6), rgba(0,255,150,0.6), rgba(255,200,0,0.6)) 1;
    }
    .input-row { display: flex; gap: 10px; align-items: flex-end; background: rgba(255,255,255,0.04); border: 2px solid rgba(108,63,255,0.2); border-radius: 18px; padding: 1px 1px 1px 5px; }
    .input-row textarea { flex: 1; background: transparent; border: none; color: #e2e2f0; font-family: 'Inter', sans-serif; font-size: 13px; padding: 10px 4px; resize: none; outline: none; max-height: 80px; min-height: 24px; }
    .input-row textarea::placeholder { color: #5a5a8a; }

    .send-btn { width: 42px; height: 42px; border-radius: 18px; background: linear-gradient(135deg, #6c3fff, #5533dd); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; box-shadow: 0 2px 12px rgba(108,63,255,0.35); }
    .send-btn:hover { transform: scale(1.02); }
    .send-btn:disabled { background: #222; cursor: not-allowed; box-shadow: none; }
    .send-btn svg { width: 18px; height: 18px; fill: #fff; }

    .footer-bar { display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 8px; }
    .footer-bar span { font-size: 11px; color: #4e4e7a; font-weight: 500; }
    .footer-bar .dot { width: 3px; height: 3px; border-radius: 50%; background: #2a2a4a; }
    .footer-bar .highlight { color: #00c8b4; font-weight: 600; }
  </style>
</head>
<body>
<div class="app-wrapper">

  <div class="header">
    <div class="brand">
      <div class="logo-wrap" id="headerIcon">🧠</div>
      <div class="brand-text">
        <h1 id="headerTitle">Caliber AI</h1>
        <p id="headerSubtitle">Focuses on the high quality of character and capability.</p>
      </div>
    </div>
    <div class="header-right">
      <span class="badge" id="activePersonaBadge">NO ROLE SELECTED</span>
    </div>
  </div>

  <div class="chat-area" id="chatArea">
    <div class="welcome" id="welcomeScreen">
      <h2>Initialize <span>AI Core Personal Agent</span></h2>
      <p>Below are suggested Roles & You can ask model to act as specific Roles</p>
      
      <div id="reconnectBox"></div>
      <div class="role-grid" id="roleGrid"></div>
      <button class="reload-btn" onclick="fetchRandomRoles()">🔄 Shuffle Role Suggestions</button>
    </div>
  </div>

  <div class="input-section">
    <div class="input-row">
      <textarea id="userInput" placeholder="Ask anything, Tell me a particular role to customize your data" rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()">
        <svg viewBox="0 0 24 24">
          <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
        </svg>
      </button>
    </div>
    
    <div class="footer-bar">
      <span class="highlight">TechnGlobal Gen AI Internship</span>
      <div class="dot"></div>
      <span id="footerActiveRole" style="color:#6c3fff;">Active: General Purpose Core</span>
      <div class="dot"></div>
      <span id="ipDisplay" style="color: #4e4e7a;">IP: Fetching...</span>
    </div>
  </div>

</div>

<script>
  const chatArea = document.getElementById('chatArea');
  const userInput = document.getElementById('userInput');
  const sendBtn = document.getElementById('sendBtn');
  
  let RUNTIME_ROLE_TRACKER = "general_purpose";

  async function fetchRandomRoles() {
    const grid = document.getElementById('roleGrid');
    if (!grid) return;
    grid.innerHTML = '<div style="color:#6b6b9a; font-size:11px; padding:10px; grid-column: 1/-1; text-align:center;">Loading profile matrices...</div>';
    
    try {
      const res = await fetch('/get_roles');
      const data = await res.json();
      
      document.getElementById('ipDisplay').textContent = `Logged IP: ${data.ip}`;
      
      if (data.is_returning) {
        const rBox = document.getElementById('reconnectBox');
        if (rBox) {
          rBox.innerHTML = `
            <div class="reconnect-banner">
              <h4>⚡ Returning Device Reconnection Found</h4>
              <p>Your network was last active utilizing the <strong>${data.saved_role_title}</strong> persona matrix blueprint.</p>
              <button class="reconnect-btn" onclick="reconnectPreviousSession('${data.saved_role}', '${data.saved_role_title}')">Restore Previous Session & History</button>
            </div>
          `;
        }
      }

      grid.innerHTML = "";
      Object.keys(data.roles).forEach(key => {
        const card = document.createElement('div');
        card.className = 'role-card';
        card.onclick = () => activatePersona(key, data.roles[key].title, false);
        card.innerHTML = `<h3>${data.roles[key].title}</h3><p>${data.roles[key].desc}</p>`;
        grid.appendChild(card);
      });
    } catch (e) {
      grid.innerHTML = '<div style="color:#ff3366; font-size:11px; grid-column: 1/-1; text-align:center;">Failed loading dynamic profiles registry.</div>';
    }
  }

  function activatePersona(roleKey, roleTitle, isRestoring) {
    RUNTIME_ROLE_TRACKER = roleKey;
    const welcome = document.getElementById('welcomeScreen');
    if (welcome) welcome.remove();
    
    document.getElementById('activePersonaBadge').textContent = roleTitle.toUpperCase();
    document.getElementById('footerActiveRole').textContent = `Active: ${roleTitle}`;
    
    const iconWrap = document.getElementById('headerIcon');
    if (iconWrap) {
      if (roleKey.includes('chef')) iconWrap.textContent = "🍳";
      else if (roleKey === 'game_dev') iconWrap.textContent = "🎮";
      else if (roleKey === 'gen_ai_specialist') iconWrap.textContent = "🤖";
      else iconWrap.textContent = "✨";
    }

    userInput.focus();
    if (!isRestoring) {
      appendMessage('bot', `System parameters successfully realigned. I am now configured to act as: **${roleTitle}**.`);
    }
  }

  async function reconnectPreviousSession(roleKey, roleTitle) {
    activatePersona(roleKey, roleTitle, true);
    try {
      const res = await fetch('/load_history');
      const data = await res.json();
      if (data.history && data.history.length > 0) {
        data.history.forEach(msg => {
          appendMessage(msg.role === 'user' ? 'user' : 'bot', msg.content);
        });
      }
    } catch {
      appendMessage('bot', 'Failed compilation cycles on data trace recovery.');
    }
  }

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) { 
      e.preventDefault(); 
      sendMessage(); 
    }
  }

  document.addEventListener("DOMContentLoaded", function() {
     userInput.focus();
  });

  function getTime() {
    return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  }

  function appendMessage(role, text) {
    const welcome = document.getElementById('welcomeScreen');
    if (welcome) welcome.remove();

    const wrap = document.createElement('div');
    wrap.className = `message ${role}`;

    const avatar = document.createElement('div');
    avatar.className = 'msg-avatar';
    avatar.textContent = role === 'bot' ? '✨' : '🧑';

    const col = document.createElement('div');
    col.className = 'msg-col';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = text;

    const time = document.createElement('div');
    time.className = 'msg-time';
    time.textContent = getTime();

    col.appendChild(bubble);
    col.appendChild(time);
    wrap.appendChild(avatar);
    wrap.appendChild(col);
    chatArea.appendChild(wrap);
    chatArea.scrollTop = chatArea.scrollHeight;
  }

  function showTyping() {
    const wrap = document.createElement('div');
    wrap.className = 'message bot typing';
    wrap.id = 'typingIndicator';

    const avatar = document.createElement('div');
    avatar.className = 'msg-avatar';
    avatar.textContent = '⚡';

    const col = document.createElement('div');
    col.className = 'msg-col';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.innerHTML = '<div class="dots"><span></span><span></span><span></span></div>';

    col.appendChild(bubble);
    wrap.appendChild(avatar);
    wrap.appendChild(col);
    chatArea.appendChild(wrap);
    chatArea.scrollTop = chatArea.scrollHeight;
  }

  function removeTyping() {
    const t = document.getElementById('typingIndicator');
    if (t) t.remove();
  }

  async function sendMessage() {
    const text = userInput.value.trim();
    if (!text) return;

    appendMessage('user', text);
    userInput.value = '';
    userInput.style.height = 'auto';
    sendBtn.disabled = true;
    showTyping();

    try {
      const res = await fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ 
          message: text,
          active_role: RUNTIME_ROLE_TRACKER 
        })
      });
      
      const data = await res.json();
      removeTyping();
      appendMessage('bot', data.reply);
      
      if (data.active_role_key) {
        RUNTIME_ROLE_TRACKER = data.active_role_key;
        
        const titleBadge = document.getElementById('activePersonaBadge');
        if (titleBadge) titleBadge.textContent = data.active_role_title.toUpperCase();
        
        const footerActive = document.getElementById('footerActiveRole');
        if (footerActive) footerActive.textContent = `Active: ${data.active_role_title}`;

        const iconWrap = document.getElementById('headerIcon');
        if (iconWrap) {
          if (RUNTIME_ROLE_TRACKER.includes('chef')) iconWrap.textContent = "🍳";
          else if (RUNTIME_ROLE_TRACKER === "game_dev") iconWrap.textContent = "🎮";
          else if (RUNTIME_ROLE_TRACKER === "gen_ai_specialist") iconWrap.textContent = "🤖";
          else iconWrap.textContent = "✨";
        }
      }
    } catch {
      removeTyping();
      appendMessage('bot', 'Internal engine pipe routing breakdown.');
    }

    sendBtn.disabled = false;
    userInput.focus();
  }

  fetchRandomRoles();
</script>
</body>
</html>
